# =========================
# AGGREGATOR MICROSERVICE
# =========================

# ConfigMap – application.yml
apiVersion: v1
kind: ConfigMap
metadata:
  name: aggregator-config
data:
  application.properties: |
    temperature.url:http://temperature-service:8080/reading
    humidity.url:http://humidity-service:8080/reading
    temperature-unit:C
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregator-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aggregator
  template:
    metadata:
      labels:
        app: aggregator
    spec:
      containers:
        - name: aggregator
          image: aggregator-microservice:0.0.1-SNAPSHOT
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"   # ostavljeno kao u tvom YAML-u
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          env:
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: file:/config/application.properties
          volumeMounts:
            - name: config-volume
              mountPath: /config
      volumes:
        - name: config-volume
          configMap:
            name: aggregator-config
---
# Service (NodePort + DNS ime)
apiVersion: v1
kind: Service
metadata:
  name: aggregator-service
spec:
  type: NodePort
  selector:
    app: aggregator
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080   # port za localhost testiranje
