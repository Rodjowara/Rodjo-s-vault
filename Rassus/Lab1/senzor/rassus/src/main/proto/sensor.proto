syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.lab1.rassus.proto";
option java_outer_classname = "SensorProto";

service SensorService {
  rpc GetReading(ReadingRequest) returns (ReadingResponse);
}

message ReadingRequest {
  string requester = 1;
}

message ReadingResponse {
  double temperature = 1;
  double pressure = 2;
  double humidity = 3;
  double co = 4;
  double no2 = 5;
  double so2 = 6;
}